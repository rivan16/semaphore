---
- name: LOOPBACK
  hosts: router1
  gather_facts: no
  become: yes

  tasks:
    - name: Create LOOPBACK
      ios_command:
        commands:
          - configure terminal
          - int lo 2
          - ip add 2.2.2.2 255.255.255.0
          - no shut
      vars:
        ansible_network_os: ios
